spring.application.name=PROJECT
server.port=8089

## Using MariaDB datasource
spring.datasource.url=jdbc:mariadb://localhost:3306/TICKET?createDatabaseIfNotExist=true&useUnicode=true&useJDBCCompliantTimezoneShift=true&useLegacyDatetimeCode=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=root

# If you want to use H2 for development, uncomment the H2 block below and comment the MySQL lines above.
# spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
# spring.datasource.driver-class-name=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=

# JPA configuration
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
# Let Hibernate 7 auto-detect MariaDB dialect from JDBC metadata
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# Thymeleaf configuration
spring.thymeleaf.cache=false
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8

# Security configuration
spring.security.user.name=admin
spring.security.user.password=admin

# Session configuration
server.servlet.session.timeout=30m
spring.session.store-type=none

# Logging
logging.level.root=INFO
logging.level.com.example.project=DEBUG
logging.level.org.springframework.security=DEBUG

