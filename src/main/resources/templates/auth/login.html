<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Kinetic Ops — Login</title>
    <!-- Google Fonts: Inter (variable weight) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS with configuration overrides for shadcn/kinetic ops consistency -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* design system overrides — matches Kinetic Ops tokens exactly */
        :root {
            --surface: #f7f9fb;
            --surface-dim: #d8dadc;
            --surface-bright: #f7f9fb;
            --surface-container-lowest: #ffffff;
            --surface-container-low: #f2f4f6;
            --surface-container: #eceef0;
            --surface-container-high: #e6e8ea;
            --surface-container-highest: #e0e3e5;
            --on-surface: #191c1e;
            --on-surface-variant: #45474c;
            --inverse-surface: #2d3133;
            --inverse-on-surface: #eff1f3;
            --outline: #75777d;
            --outline-variant: #c5c6cd;
            --surface-tint: #545f73;
            --primary: #091426;
            --on-primary: #ffffff;
            --primary-container: #1e293b;
            --on-primary-container: #8590a6;
            --inverse-primary: #bcc7de;
            --secondary: #0058be;
            --on-secondary: #ffffff;
            --secondary-container: #2170e4;
            --on-secondary-container: #fefcff;
            --tertiary: #041528;
            --on-tertiary: #ffffff;
            --tertiary-container: #1a2a3e;
            --on-tertiary-container: #8191a9;
            --error: #ba1a1a;
            --on-error: #ffffff;
            --error-container: #ffdad6;
            --on-error-container: #93000a;
            --primary-fixed: #d8e3fb;
            --primary-fixed-dim: #bcc7de;
            --on-primary-fixed: #111c2d;
            --secondary-fixed: #d8e2ff;
            --secondary-fixed-dim: #adc6ff;
            --background: #f7f9fb;
            --on-background: #191c1e;
            --surface-variant: #e0e3e5;
            --radius-sm: 0.125rem;
            --radius-default: 0.25rem;
            --radius-md: 0.375rem;
            --radius-lg: 0.5rem;
            --radius-xl: 0.75rem;
            --radius-full: 9999px;
        }

        /* base overrides for shadcn-inspired polish / kinetic precision */
        body {
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #091426 0%, #1e293b 100%);
            background-attachment: fixed;
            font-synthesis: none;
            text-rendering: optimizeLegibility;
        }

        /* custom card styles respecting elevation = level 2 (active hover subtle) + border approach */
        .kinetic-card {
            background-color: var(--surface-container-lowest, #ffffff);
            border: 1px solid var(--outline-variant, #c5c6cd);
            border-radius: var(--radius-lg, 0.5rem);
            transition: box-shadow 0.2s ease, border-color 0.2s ease;
            box-shadow: 0px 4px 12px rgba(30, 41, 59, 0.05);
        }

        .kinetic-card:hover {
            border-color: #bcc7de;
            box-shadow: 0px 6px 14px rgba(30, 41, 59, 0.08);
        }

        /* input fields: flat, border, focus ring = blue 500 (shadcn style) */
        .kinetic-input {
            width: 100%;
            padding: 0.5rem 0.875rem;
            font-size: 0.875rem;
            line-height: 1.25rem;
            background-color: var(--surface-container-lowest);
            border: 1px solid var(--outline-variant, #c5c6cd);
            border-radius: var(--radius-default, 0.25rem);
            font-family: 'Inter', sans-serif;
            transition: border 0.2s, box-shadow 0.2s;
            color: var(--on-surface, #191c1e);
        }

        .kinetic-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.25);
        }

        /* primary button (navy background, white text, consistent with primary) */
        .kinetic-btn-primary {
            background-color: #091426;
            color: white;
            font-weight: 600;
            font-size: 0.875rem;
            line-height: 1.25rem;
            padding: 0.625rem 1rem;
            border-radius: var(--radius-default, 0.25rem);
            transition: all 0.2s ease;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            letter-spacing: 0.01em;
        }

        .kinetic-btn-primary:hover {
            background-color: #1e293b;
            transform: translateY(-0.5px);
        }

        .kinetic-btn-primary:focus-visible {
            outline: none;
            ring: 2px solid #3b82f6;
            ring-offset: 2px;
        }

        /* label style from design: label-md weight semi-bold with tracking */
        .kinetic-label {
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.75rem;
            line-height: 1rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: var(--on-surface-variant, #45474c);
            margin-bottom: 0.5rem;
            display: block;
        }

        /* body-sm for helper, subtle messages */
        .kinetic-body-sm {
            font-size: 0.8125rem;
            line-height: 1.125rem;
            font-weight: 400;
            color: var(--on-surface-variant, #45474c);
        }

        /* status messages with semantic colors and icons */
        .alert-success {
            background-color: #e6f4ea;
            border-left: 4px solid #2e7d32;
            border-radius: var(--radius-default, 0.25rem);
            padding: 0.75rem 1rem;
            color: #1e4620;
            font-size: 0.8125rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .alert-error {
            background-color: #ffdad6;
            border-left: 4px solid #ba1a1a;
            border-radius: var(--radius-default, 0.25rem);
            padding: 0.75rem 1rem;
            color: #93000a;
            font-size: 0.8125rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* checkbox styling matches shadcn / modern accessible */
        .kinetic-checkbox {
            width: 1rem;
            height: 1rem;
            border-radius: var(--radius-sm, 0.125rem);
            border: 1px solid var(--outline-variant, #c5c6cd);
            background-color: white;
            accent-color: #091426;
            cursor: pointer;
        }

        .kinetic-checkbox:focus {
            outline: 2px solid #3b82f6;
            outline-offset: 2px;
        }

        /* divider */
        .kinetic-divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: var(--outline, #75777d);
            font-size: 0.75rem;
            margin: 1.5rem 0;
        }
        .kinetic-divider::before,
        .kinetic-divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--outline-variant, #c5c6cd);
        }
        .kinetic-divider::before {
            margin-right: 1rem;
        }
        .kinetic-divider::after {
            margin-left: 1rem;
        }

        /* subtle link style */
        .kinetic-link {
            color: #0058be;
            font-weight: 600;
            text-decoration: none;
            transition: color 0.2s;
        }
        .kinetic-link:hover {
            color: #091426;
            text-decoration: underline;
            text-underline-offset: 2px;
        }

        /* ticket system logo / wordmark */
        .kinetic-logo {
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #091426 0%, #1e293b 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4" style="background: linear-gradient(135deg, #091426 0%, #1e293b 100%);">
    <div class="w-full max-w-md" th:with="csrfToken=${_csrf.token}, paramSuccess=${param.success}, paramError=${param.error}">
        <!-- Kinetic card: matches tonal container + 1px border, level 2 soft shadow -->
        <div class="kinetic-card bg-white p-6 sm:p-8 rounded-xl transition-all">
            <!-- Brand header with composed corporate tone -->
            <div class="text-center mb-6">
                <div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-primary-container/10 mb-3" style="background-color: rgba(30,41,59,0.08);">
                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#091426" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                        <polyline points="14 2 14 8 20 8" />
                        <line x1="16" y1="13" x2="8" y2="13" />
                        <line x1="16" y1="17" x2="8" y2="17" />
                        <polyline points="10 9 9 9 8 9" />
                    </svg>
                </div>
                <h1 class="text-2xl sm:text-3xl font-bold tracking-tight text-slate-900" style="font-family: Inter; letter-spacing: -0.02em;">Kinetic<span class="font-normal text-slate-600"> Ops</span></h1>
                <p class="text-sm text-slate-500 mt-1 font-medium">Support workspace · sign in</p>
            </div>

            <!-- Success alert (registration successful) -->
            <div th:if="${param.success != null}" class="mb-6">
                <div class="alert-success">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                    <span>✓ Registration successful! Please log in.</span>
                </div>
            </div>

            <!-- Login form with CSRF protection (Thymeleaf ready) -->
            <form method="post" action="/login" class="space-y-5" th:action="@{/login}" th:object="${loginForm}">
                <!-- CSRF token injection for Thymeleaf -->
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                
                <!-- Email field with design system label -->
                <div>
                    <label for="username" class="kinetic-label">Email address</label>
                    <input type="text" id="username" name="username" required
                           class="kinetic-input"
                           placeholder="agent@kineticops.com"
                           autocomplete="email">
                    <p class="kinetic-body-sm mt-1.5">Work email for secure access</p>
                </div>

                <!-- Password field -->
                <div>
                    <label for="password" class="kinetic-label">Password</label>
                    <input type="password" id="password" name="password" required
                           class="kinetic-input"
                           placeholder="··········"
                           autocomplete="current-password">
                </div>

                <!-- Remember me row: shadcn-style inline -->
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-2">
                        <input type="checkbox" id="remember-me" name="remember-me" value="true"
                               class="kinetic-checkbox">
                        <label for="remember-me" class="text-sm font-medium text-slate-700 select-none" style="font-weight:500;">Remember session</label>
                    </div>
                    <a href="#" class="kinetic-link text-xs font-medium tracking-wide">Forgot password?</a>
                </div>

                <!-- Error message block from login failure (param.error) -->
                <div th:if="${param.error != null}" class="mt-2">
                    <div class="alert-error">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                        <span>✗ Invalid email or password</span>
                    </div>
                </div>

                <!-- Sign in primary button -->
                <button type="submit" class="kinetic-btn-primary w-full mt-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
                    Sign In
                </button>
            </form>

            <!-- Divider with 'New to Kinetic Ops?' tone -->
            <div class="kinetic-divider">
                <span class="px-2 text-xs font-medium uppercase tracking-wider text-slate-500">Secure access</span>
            </div>

            <!-- Registration prompt -->
            <div class="text-center">
                <p class="text-sm text-slate-600">
                    No access yet?
                    <a href="/register" class="kinetic-link ml-1 font-semibold">Request account →</a>
                </p>
                <p class="text-xs text-slate-400 mt-3">Enterprise-grade support console</p>
            </div>
        </div>

        <!-- subtle footnote with design system metadata -->
        <div class="text-center mt-6 text-xs text-white/60 backdrop-blur-sm">
            <span class="inline-block px-3 py-1 rounded-full bg-white/5">Kinetic Ops v2 · composed workspace</span>
        </div>
    </div>

    <!-- Inter font variable fallback fully loaded; optionally extra styling ensures no layout shift -->
    <script>
        // small script to inherit dynamic class if needed for consistent border focus ring.
        // ensures interactive elements meet design guidelines (prevent default ring tailwind override)
        document.querySelectorAll('.kinetic-input').forEach(input => {
            input.addEventListener('focus', () => {
                input.style.outline = 'none';
            });
        });
    </script>
</body>
</html>
