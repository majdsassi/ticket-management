<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Ticket System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #091426 0%, #1e293b 100%);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">
    <div class="w-full max-w-md">
        <div class="bg-white rounded-lg shadow-xl p-8">
            <h1 class="text-3xl font-bold text-center text-slate-900 mb-8">🎫 Ticket System</h1>
            
            <div th:if="${param.success}" class="mb-6 p-4 bg-green-50 border border-green-200 rounded-md text-green-700 text-sm">
                ✓ Registration successful! Please log in.
            </div>

            <form method="post" action="/login" class="space-y-6">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div>
                    <label for="username" class="block text-sm font-medium text-slate-700 mb-2">Email</label>
                    <input type="text" id="username" name="username" required 
                           class="w-full px-4 py-2 border border-slate-200 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                           placeholder="your@email.com">
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-slate-700 mb-2">Password</label>
                    <input type="password" id="password" name="password" required 
                           class="w-full px-4 py-2 border border-slate-200 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                           placeholder="••••••••">
                </div>

                <div class="flex items-center">
                    <input type="checkbox" id="remember" name="remember-me" value="true"
                           class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-slate-300 rounded">
                    <label for="remember" class="ml-2 block text-sm text-slate-700">Remember me</label>
                </div>

                <div th:if="${param.error}" class="p-4 bg-red-50 border border-red-200 rounded-md text-red-600 text-sm">
                    ✗ Invalid email or password
                </div>

                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-md transition-colors">
                    Sign In
                </button>
            </form>

            <hr class="my-6">

            <p class="text-center text-slate-600">
                Don't have an account? 
                <a href="/register" class="text-blue-600 hover:text-blue-700 font-medium">Register here</a>
            </p>
        </div>
    </div>
</body>
</html>
