<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Out - SupportHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #f7f9fb;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4">
    <div class="w-full max-w-md bg-white border border-slate-200 rounded-xl p-8 shadow-sm">
        <h1 class="text-2xl font-semibold text-slate-900 mb-2">Sign out</h1>
        <p class="text-slate-600 mb-6">Confirm to end your session.</p>
        <form method="post" action="/logout" class="space-y-4">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" class="w-full bg-slate-900 text-white py-2 rounded-lg font-semibold hover:bg-slate-800 transition">Sign out</button>
            <a href="/dashboard" class="block text-center text-slate-600 hover:text-slate-900">Back to dashboard</a>
        </form>
    </div>
</body>
</html>
