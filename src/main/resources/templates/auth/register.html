<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Ticket System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #091426 0%, #1e293b 100%);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen py-12">
    <div class="w-full max-w-md">
        <div class="bg-white rounded-lg shadow-xl p-8">
            <h1 class="text-3xl font-bold text-center text-slate-900 mb-2">🎫 Ticket System</h1>
            <p class="text-center text-slate-600 mb-8">Create your account</p>
            
            <div th:if="${error}" class="mb-6 p-4 bg-red-50 border border-red-200 rounded-md text-red-600 text-sm">
                ✗ <span th:text="${error}"></span>
            </div>

            <form method="post" action="/register" class="space-y-4">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div>
                    <label for="fullName" class="block text-sm font-medium text-slate-700 mb-1">Full Name</label>
                    <input type="text" id="fullName" name="fullName" required 
                           class="w-full px-4 py-2 border border-slate-200 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                           placeholder="John Doe">
                </div>

                <div>
                    <label for="email" class="block text-sm font-medium text-slate-700 mb-1">Email</label>
                    <input type="email" id="email" name="email" required 
                           class="w-full px-4 py-2 border border-slate-200 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                           placeholder="your@email.com">
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                    <input type="password" id="password" name="password" required 
                           class="w-full px-4 py-2 border border-slate-200 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                           placeholder="Minimum 6 characters">
                </div>

                <div>
                    <label for="confirmPassword" class="block text-sm font-medium text-slate-700 mb-1">Confirm Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required 
                           class="w-full px-4 py-2 border border-slate-200 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                           placeholder="Repeat password">
                </div>

                <div>
                    <label for="role" class="block text-sm font-medium text-slate-700 mb-1">Account Type</label>
                    <select id="role" name="role" class="w-full px-4 py-2 border border-slate-200 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="CUSTOMER">Customer</option>
                        <option value="CUSTOMER_SUPPORT">Support Agent</option>
                    </select>
                </div>

                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-md transition-colors mt-6">
                    Create Account
                </button>
            </form>

            <hr class="my-6">

            <p class="text-center text-slate-600">
                Already have an account? 
                <a href="/login" class="text-blue-600 hover:text-blue-700 font-medium">Log in here</a>
            </p>
        </div>
    </div>
</body>
</html>
