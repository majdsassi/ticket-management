<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Support Reply</title>
</head>
<body>
<h1>Create Support Reply</h1>

<form th:action="@{/comments}" method="post">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

    <label>Ticket:</label>
    <select name="ticketId" required>
        <option value="">-- Select Ticket --</option>
        <option th:each="t : ${tickets}" th:value="${t.id}" th:text="${t.title}"></option>
    </select><br/>

    <label>Message:</label>
    <textarea name="message" required></textarea><br/>

    <p th:if="${currentUser != null}" th:text="'Posting as ' + ${currentUser.fullName}"></p>

    <button type="submit">Post Reply</button>
    <a href="/comments">Cancel</a>
</form>
</body>
</html>
