<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - SupportHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #f7f9fb;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4">
    <div class="w-full max-w-lg bg-white border border-slate-200 rounded-xl p-8 shadow-sm text-center">
        <h1 class="text-3xl font-semibold text-slate-900 mb-2">Something went wrong</h1>
        <p class="text-slate-600 mb-6">We could not complete your request. Please try again.</p>
        <div class="text-sm text-slate-500 mb-6" th:if="${status}">
            <span th:text="'Status: ' + ${status}">Status</span>
            <span th:if="${error}" th:text="' • ' + ${error}"></span>
        </div>
        <div class="flex flex-col gap-3">
            <a href="/dashboard" class="bg-slate-900 text-white py-2 rounded-lg font-semibold hover:bg-slate-800 transition">Go to dashboard</a>
            <a href="/login" class="text-slate-600 hover:text-slate-900">Go to login</a>
        </div>
    </div>
</body>
</html>
