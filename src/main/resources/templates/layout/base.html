<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' - Ticket System'">Ticket System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'navy': '#091426',
                        'primary': '#1e293b',
                        'blue': '#0058be',
                        'slate-50': '#f8fafc',
                        'slate-100': '#f1f5f9',
                        'slate-200': '#e2e8f0',
                        'slate-300': '#cbd5e1',
                        'slate-400': '#94a3b8',
                        'slate-500': '#64748b',
                        'slate-600': '#475569',
                        'slate-700': '#334155',
                        'surface': '#f7f9fb',
                        'surface-dim': '#d8dadc',
                        'surface-container': '#eceef0',
                        'error': '#ba1a1a'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            @apply bg-surface text-on-surface font-sans;
        }
        
        .navbar {
            @apply sticky top-0 z-50 bg-navy text-white shadow-md;
        }
        
        .btn-primary {
            @apply bg-blue hover:bg-blue-700 text-white px-4 py-2 rounded-md font-medium transition-colors;
        }
        
        .btn-secondary {
            @apply bg-slate-200 hover:bg-slate-300 text-slate-900 px-4 py-2 rounded-md font-medium transition-colors;
        }
        
        .btn-danger {
            @apply bg-error hover:bg-red-700 text-white px-4 py-2 rounded-md font-medium transition-colors;
        }
        
        .card {
            @apply bg-white border border-slate-200 rounded-lg shadow-sm;
        }
        
        .input-field {
            @apply w-full px-3 py-2 border border-slate-200 rounded-md focus:outline-none focus:border-blue focus:ring-1 focus:ring-blue;
        }
        
        .badge-open {
            @apply inline-block bg-blue-50 text-blue px-3 py-1 rounded-full text-sm font-medium;
        }
        
        .badge-assigned {
            @apply inline-block bg-yellow-50 text-yellow-700 px-3 py-1 rounded-full text-sm font-medium;
        }
        
        .badge-resolved {
            @apply inline-block bg-green-50 text-green-700 px-3 py-1 rounded-full text-sm font-medium;
        }
        
        .badge-closed {
            @apply inline-block bg-slate-100 text-slate-700 px-3 py-1 rounded-full text-sm font-medium;
        }
        
        .badge-urgent {
            @apply inline-block bg-red-50 text-error px-3 py-1 rounded-full text-sm font-medium;
        }
        
        .badge-high {
            @apply inline-block bg-orange-50 text-orange-700 px-3 py-1 rounded-full text-sm font-medium;
        }
        
        .badge-medium {
            @apply inline-block bg-yellow-50 text-yellow-700 px-3 py-1 rounded-full text-sm font-medium;
        }
        
        .badge-low {
            @apply inline-block bg-green-50 text-green-700 px-3 py-1 rounded-full text-sm font-medium;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center">
                    <a href="/dashboard" class="text-xl font-bold">🎫 Ticket System</a>
                </div>
                <div class="flex items-center space-x-4" sec:authorize="isAuthenticated()">
                    <span th:text="'Welcome, ' + ${#authentication.principal.fullName}"></span>
                    <form action="/logout" method="post" style="display: inline;">
                        <button type="submit" class="btn-secondary text-sm">Logout</button>
                    </form>
                </div>
                <div sec:authorize="!isAuthenticated()">
                    <a href="/login" class="btn-secondary text-sm mr-2">Login</a>
                    <a href="/register" class="btn-primary text-sm">Register</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="flex h-screen bg-surface-dim">
        <!-- Sidebar -->
        <aside class="w-64 bg-white shadow-md" sec:authorize="isAuthenticated()">
            <div class="p-6">
                <nav class="space-y-4">
                    <a href="/dashboard" class="block px-4 py-2 rounded-md hover:bg-slate-50 text-slate-700 font-medium">
                        📊 Dashboard
                    </a>
                    <a href="/tickets" class="block px-4 py-2 rounded-md hover:bg-slate-50 text-slate-700 font-medium">
                        🎫 Tickets
                    </a>
                    <a href="/tickets/new" class="block px-4 py-2 rounded-md hover:bg-slate-50 text-blue font-medium">
                        ➕ New Ticket
                    </a>
                    
                    <div sec:authorize="hasRole('ADMIN')">
                        <hr class="my-4">
                        <h3 class="text-slate-600 text-sm font-bold mb-3">Admin</h3>
                        <a href="/admin/users" class="block px-4 py-2 rounded-md hover:bg-slate-50 text-slate-700 font-medium">
                            👥 Manage Users
                        </a>
                        <a href="/admin/projects" class="block px-4 py-2 rounded-md hover:bg-slate-50 text-slate-700 font-medium">
                            📁 Manage Projects
                        </a>
                        <a href="/admin/settings" class="block px-4 py-2 rounded-md hover:bg-slate-50 text-slate-700 font-medium">
                            ⚙️ Settings
                        </a>
                    </div>
                    
                    <div sec:authorize="hasRole('CUSTOMER_SUPPORT')">
                        <hr class="my-4">
                        <h3 class="text-slate-600 text-sm font-bold mb-3">Support</h3>
                        <a href="/support/queue" class="block px-4 py-2 rounded-md hover:bg-slate-50 text-slate-700 font-medium">
                            📋 Support Queue
                        </a>
                    </div>
                </nav>
            </div>
        </aside>

        <!-- Main content -->
        <main class="flex-1 overflow-auto">
            <div class="p-8">
                <!-- Alert Messages -->
                <div th:if="${param.success}" class="mb-6 p-4 bg-green-50 border border-green-200 rounded-md text-green-700">
                    ✓ Operation completed successfully!
                </div>
                <div th:if="${error}" class="mb-6 p-4 bg-red-50 border border-error rounded-md text-error">
                    ✗ <span th:text="${error}"></span>
                </div>

                <!-- Page content -->
                <div th:replace="${content}"></div>
            </div>
        </main>
    </div>
</body>
</html>
