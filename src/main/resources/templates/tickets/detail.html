<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'Ticket #' + ${ticket.id}">Ticket</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { @apply bg-slate-50 text-slate-900; }
        .navbar { @apply sticky top-0 z-50 bg-gradient-to-r from-navy to-primary text-white shadow-md; }
        .card { @apply bg-white border border-slate-200 rounded-lg shadow-sm p-6; }
        .btn-primary { @apply bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-md font-medium transition-colors; }
        .input-field { @apply w-full px-4 py-2 border border-slate-200 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500; }
        .badge { @apply inline-block px-3 py-1 rounded-full text-sm font-medium; }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <a href="/dashboard" class="text-2xl font-bold">🎫 Ticket System</a>
                <div class="flex items-center space-x-4">
                    <span th:text="${#authentication.principal.fullName}" class="text-sm"></span>
                    <form action="/logout" method="post" style="display: inline;">
                        <button type="submit" class="bg-white text-navy px-4 py-2 rounded-md font-medium hover:bg-slate-100">Logout</button>
                    </form>
                </div>
            </div>
        </div>
    </nav>

    <div class="flex">
        <!-- Sidebar -->
        <aside class="w-64 bg-white shadow-md min-h-screen">
            <div class="p-6">
                <nav class="space-y-2">
                    <a href="/dashboard" class="block px-4 py-3 rounded-md hover:bg-slate-100 text-slate-700">
                        📊 Dashboard
                    </a>
                    <a href="/tickets" class="block px-4 py-3 rounded-md bg-blue-50 text-blue-600 font-medium">
                        🎫 Tickets
                    </a>
                    <a href="/tickets/new" class="block px-4 py-3 rounded-md hover:bg-slate-100 text-slate-700">
                        ➕ New Ticket
                    </a>
                </nav>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 p-8">
            <div class="mb-8">
                <div class="flex justify-between items-center mb-4">
                    <h1 class="text-4xl font-bold text-slate-900" th:text="'Ticket #' + ${ticket.id}"></h1>
                    <a href="/tickets" class="text-blue-600 hover:text-blue-800 font-medium">← Back to Tickets</a>
                </div>
                <p class="text-slate-600" th:text="${#temporals.format(ticket.createdAt, 'MMMM dd, yyyy HH:mm')}"></p>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <!-- Main Content -->
                <div class="lg:col-span-2">
                    <!-- Ticket Title & Description -->
                    <div class="card mb-8">
                        <h2 class="text-2xl font-bold text-slate-900 mb-4" th:text="${ticket.title}"></h2>
                        <div class="prose prose-sm max-w-none">
                            <p class="text-slate-700 whitespace-pre-wrap" th:text="${ticket.description}"></p>
                        </div>
                    </div>

                    <!-- Edit Form (if user can edit) -->
                    <div th:if="${canEdit}" class="card">
                        <h3 class="text-lg font-bold text-slate-900 mb-6">Edit Ticket</h3>
                        <form method="post" th:action="@{/tickets/{id}/update(id=${ticket.id})}" class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-2">Title</label>
                                <input type="text" name="title" th:value="${ticket.title}" required class="input-field">
                            </div>

                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-2">Description</label>
                                <textarea name="description" rows="4" class="input-field" th:text="${ticket.description}"></textarea>
                            </div>

                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-sm font-medium text-slate-700 mb-2">Status</label>
                                    <select name="status" required class="input-field">
                                        <option th:each="status : ${statuses}" 
                                                th:value="${status.name()}" 
                                                th:text="${status.name()}"
                                                th:selected="${ticket.status.name() == status.name()}"></option>
                                    </select>
                                </div>

                                <div>
                                    <label class="block text-sm font-medium text-slate-700 mb-2">Priority</label>
                                    <select name="priority" required class="input-field">
                                        <option th:each="priority : ${priorities}" 
                                                th:value="${priority.name()}" 
                                                th:text="${priority.name()}"
                                                th:selected="${ticket.priority.name() == priority.name()}"></option>
                                    </select>
                                </div>
                            </div>

                            <div sec:authorize="hasAnyRole('ADMIN','CUSTOMER_SUPPORT')">
                                <label class="block text-sm font-medium text-slate-700 mb-2">Assign To</label>
                                <select name="assigneeId" class="input-field">
                                    <option value="">-- Unassigned --</option>
                                    <option th:each="user : ${users}" 
                                            th:value="${user.id}" 
                                            th:text="${user.fullName}"
                                            th:selected="${ticket.assignee != null && ticket.assignee.id == user.id}"></option>
                                </select>
                            </div>

                            <div class="flex gap-2">
                                <button type="submit" class="btn-primary">Save Changes</button>
                                <form method="post" th:action="@{/tickets/{id}/delete(id=${ticket.id})}" style="display: inline;">
                                    <button type="submit" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-md font-medium transition-colors" onclick="return confirm('Are you sure?')">Delete Ticket</button>
                                </form>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Sidebar Info -->
                <div class="lg:col-span-1">
                    <!-- Status Card -->
                    <div class="card mb-6">
                        <h3 class="text-sm font-bold text-slate-600 mb-4 uppercase">Status</h3>
                        <div class="space-y-4">
                            <div>
                                <p class="text-xs text-slate-600 mb-2">Current Status</p>
                                <div class="badge" th:if="${ticket.status.name() == 'OPEN'}" style="background: rgb(219 234 254); color: rgb(30 58 138);">Open</div>
                                    <div class="badge" th:if="${ticket.status.name() == 'IN_PROGRESS'}" style="background: rgb(254 243 192); color: rgb(113 63 18);">In Progress</div>
                                <div class="badge" th:if="${ticket.status.name() == 'RESOLVED'}" style="background: rgb(220 252 231); color: rgb(5 46 22);">Resolved</div>
                                <div class="badge" th:if="${ticket.status.name() == 'CLOSED'}" style="background: rgb(241 245 249); color: rgb(51 65 85);">Closed</div>
                            </div>

                            <div>
                                <p class="text-xs text-slate-600 mb-2">Priority</p>
                                <div class="badge" th:if="${ticket.priority.name() == 'URGENT'}" style="background: rgb(254 226 226); color: rgb(127 29 29);">🔴 Urgent</div>
                                <div class="badge" th:if="${ticket.priority.name() == 'HIGH'}" style="background: rgb(254 237 210); color: rgb(92 51 23);">🟠 High</div>
                                <div class="badge" th:if="${ticket.priority.name() == 'MEDIUM'}" style="background: rgb(254 243 192); color: rgb(113 63 18);">🟡 Medium</div>
                                <div class="badge" th:if="${ticket.priority.name() == 'LOW'}" style="background: rgb(220 252 231); color: rgb(5 46 22);">🟢 Low</div>
                            </div>
                        </div>
                    </div>

                    <!-- Details Card -->
                    <div class="card mb-6">
                        <h3 class="text-sm font-bold text-slate-600 mb-4 uppercase">Details</h3>
                        <dl class="space-y-4 text-sm">
                            <div>
                                <dt class="text-xs text-slate-600 font-medium">Project</dt>
                                <dd class="text-slate-900 font-medium" th:text="${ticket.project.name}"></dd>
                            </div>
                            <div>
                                <dt class="text-xs text-slate-600 font-medium">Reporter</dt>
                                <dd class="text-slate-900 font-medium" th:text="${ticket.reporter.fullName}"></dd>
                            </div>
                            <div>
                                <dt class="text-xs text-slate-600 font-medium">Assignee</dt>
                                <dd class="text-slate-900 font-medium" th:text="${ticket.assignee != null ? ticket.assignee.fullName : 'Unassigned'}"></dd>
                            </div>
                            <div>
                                <dt class="text-xs text-slate-600 font-medium">Created</dt>
                                <dd class="text-slate-900 font-medium" th:text="${#temporals.format(ticket.createdAt, 'MMM dd, yyyy')}"></dd>
                            </div>
                            <div>
                                <dt class="text-xs text-slate-600 font-medium">Updated</dt>
                                <dd class="text-slate-900 font-medium" th:text="${#temporals.format(ticket.updatedAt, 'MMM dd, yyyy')}"></dd>
                            </div>
                        </dl>
                    </div>

                    <!-- Comments Card -->
                    <div class="card">
                        <h3 class="text-sm font-bold text-slate-600 mb-4 uppercase">Comments</h3>
                        <div class="space-y-4 text-sm">
                            <p th:if="${ticket.comments.isEmpty()}" class="text-slate-600 italic">No comments yet.</p>
                            <div th:each="comment : ${ticket.comments}" class="border-t border-slate-200 pt-4">
                                <p class="font-medium text-slate-900" th:text="${comment.author.fullName}"></p>
                                <p class="text-xs text-slate-600 mb-2" th:text="${#temporals.format(comment.createdAt, 'MMM dd, yyyy HH:mm')}"></p>
                                <p class="text-slate-700" th:text="${comment.message}"></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
