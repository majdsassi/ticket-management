<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'Ticket #' + ${ticket.id} + ' - SupportHub'">Ticket Detail</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f7f9fb; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    </style>
    <script>
        tailwind.config = {
            theme: { extend: { colors: {
                surface: '#f7f9fb',
                'surface-container-lowest': '#ffffff',
                'surface-container-low': '#f2f4f6',
                primary: '#091426',
                secondary: '#0058be',
                'on-surface': '#191c1e',
                'on-surface-variant': '#45474c',
                outline: '#75777d',
                'outline-variant': '#c5c6cd',
                error: '#ba1a1a',
                'error-container': '#ffdad6'
            }}}}
        }
    </script>
</head>
<body class="bg-surface text-on-surface">
<aside class="bg-primary text-white h-screen w-64 fixed left-0 top-0 flex flex-col p-4 z-50">
    <div class="mb-8">
        <h1 class="text-xl font-semibold">SupportHub</h1>
        <p class="text-xs text-white/70">Senior Agent</p>
    </div>
    <nav class="flex-1 space-y-2 text-sm">
        <a class="flex items-center gap-3 px-3 py-2 text-white/70 hover:text-white hover:bg-primary-container rounded-lg" href="/dashboard">
            <span class="material-symbols-outlined">dashboard</span>Dashboard
        </a>
        <a class="flex items-center gap-3 px-3 py-2 bg-secondary-container text-white rounded-lg" href="/tickets">
            <span class="material-symbols-outlined">confirmation_number</span>Ticket Queue
        </a>
    </nav>
    <a href="/tickets/new" class="w-full bg-secondary text-white py-2 rounded-lg text-sm text-center">New Ticket</a>
    <div class="mt-6 border-t border-white/10 pt-4 text-sm text-white/70">
        <a class="flex items-center gap-3 px-3 py-2 hover:text-white" href="/logout">Sign out</a>
    </div>
</aside>

<header class="flex justify-between items-center h-16 px-6 ml-64 sticky top-0 bg-surface border-b border-outline-variant z-40">
    <div class="flex items-center gap-3 bg-surface-container-low px-3 py-2 rounded-lg w-96">
        <span class="material-symbols-outlined text-on-surface-variant">search</span>
        <input class="bg-transparent border-none focus:ring-0 text-sm w-full" placeholder="Search tickets, customers..." type="text">
    </div>
    <div class="flex items-center gap-3">
        <button class="p-2 rounded-full hover:bg-surface-container-low"><span class="material-symbols-outlined">notifications</span></button>
        <button class="p-2 rounded-full hover:bg-surface-container-low"><span class="material-symbols-outlined">history</span></button>
        <button class="p-2 rounded-full hover:bg-surface-container-low"><span class="material-symbols-outlined">account_circle</span></button>
    </div>
</header>

<main class="ml-64 p-6">
    <div class="flex gap-6 max-w-[1600px] mx-auto">
        <section class="flex-grow space-y-4">
            <div class="bg-surface-container-lowest p-6 rounded-xl border border-outline-variant flex justify-between items-start">
                <div>
                    <div class="flex items-center gap-2 mb-2">
                        <span class="text-xs text-on-surface-variant" th:text="'TICKET #' + ${ticket.id}"></span>
                        <span class="px-2 py-0.5 bg-error-container text-on-error-container rounded text-xs" th:if="${ticket.priority.name() == 'URGENT'}">Urgent</span>
                    </div>
                    <h2 class="text-lg font-semibold text-primary" th:text="${ticket.title}"></h2>
                </div>
                <div class="flex gap-2">
                    <a class="px-4 py-2 border border-outline-variant rounded-lg text-xs" href="/tickets">Back to queue</a>
                    <a class="px-4 py-2 bg-primary text-white rounded-lg text-xs" th:href="@{/tickets/{id}(id=${ticket.id})}">Actions</a>
                </div>
            </div>

            <div class="space-y-4">
                <div class="flex gap-3">
                    <div class="w-10 h-10 rounded-full bg-surface-container-low flex items-center justify-center text-xs font-semibold">CU</div>
                    <div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-4 flex-grow">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-sm font-semibold" th:text="${ticket.reporter.fullName}"></span>
                            <span class="text-xs text-on-surface-variant" th:text="${#temporals.format(ticket.createdAt, 'MMM dd, HH:mm')}"></span>
                        </div>
                        <p class="text-sm text-on-surface" th:text="${ticket.description}"></p>
                    </div>
                </div>
                

                <div class="space-y-3" th:if="${!ticket.comments.isEmpty()}">
                    <div class="flex gap-3" th:each="comment : ${ticket.comments}">
                        <div class="w-10 h-10 rounded-full bg-surface-container-low flex items-center justify-center text-xs font-semibold">AG</div>
                        <div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-4 flex-grow">
                            <div class="flex justify-between items-center mb-2">
                                <span class="text-sm font-semibold" th:text="${comment.author.fullName}"></span>
                                <span class="text-xs text-on-surface-variant" th:text="${#temporals.format(comment.createdAt, 'MMM dd, HH:mm')}"></span>
                            </div>
                            <p class="text-sm text-on-surface" th:text="${comment.message}"></p>
                        </div>
                    </div>
                </div>
            </div>
            <div th:if="${currentUser != null and (currentUser.role.name() == 'ADMIN' or (currentUser.role.name() == 'CUSTOMER' and ticket.reporter.id == currentUser.id))}">

                <div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-4" sec:authorize="isAuthenticated()">
                        <h3 class="text-xs font-semibold uppercase text-on-surface-variant mb-3">Reply to Ticket</h3>
                        <form th:action="@{/comments}" method="post" class="space-y-3">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <input type="hidden" name="ticketId" th:value="${ticket.id}" />
                            <textarea id="customerReply" name="message" rows="4" class="w-full rounded-lg border border-outline-variant bg-white px-3 py-2 text-sm" placeholder="Write your reply..."></textarea>
                            <button type="submit" class="px-4 py-2 bg-black/80 text-white rounded-lg text-sm font-medium">Send reply</button>
                        </form>
                    </div>
                    <p class="text-sm text-on-surface-variant" th:unless="${currentUser != null and (currentUser.role.name() == 'ADMIN' or currentUser.role.name() == 'CUSTOMER_SUPPORT' or (currentUser.role.name() == 'CUSTOMER' and ticket.reporter.id == currentUser.id))}">You can only reply to tickets you reported.</p>
                </div>
        </section>

        <aside class="w-80 space-y-4">
            <div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-4">
                <h3 class="text-xs font-semibold uppercase text-on-surface-variant mb-3">Ticket Properties</h3>
                <div class="grid gap-3 text-sm">
                    <div>
                        <p class="text-xs text-on-surface-variant">Status</p>
                        <p class="font-semibold" th:text="${ticket.status.name()}"></p>
                    </div>
                    <div>
                        <p class="text-xs text-on-surface-variant">Priority</p>
                        <p class="font-semibold" th:text="${ticket.priority.name()}"></p>
                    </div>
                    <div>
                        <p class="text-xs text-on-surface-variant">Assignee</p>
                        <p class="font-semibold" th:text="${ticket.assignee != null ? ticket.assignee.fullName : 'Unassigned'}"></p>
                    </div>
                </div>
            </div>

            <div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-4" sec:authorize="hasAnyRole('ADMIN', 'CUSTOMER_SUPPORT')">
                <h3 class="text-xs font-semibold uppercase text-on-surface-variant mb-3">Support Actions</h3>
                <form th:action="@{/tickets/{id}/status(id=${ticket.id})}" method="post" class="space-y-3 mb-4">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <label class="block text-xs font-semibold uppercase text-on-surface-variant mb-1" for="status">Change status</label>
                    <select id="status" name="status" class="w-full rounded-lg border border-outline-variant bg-white px-3 py-2 text-sm">
                        <option th:each="statusOption : ${statuses}" th:value="${statusOption.name()}" th:text="${statusOption.name()}" th:selected="${statusOption == ticket.status}"></option>
                    </select>
                    <button type="submit" class="w-full rounded-lg px-4 py-2 text-sm font-medium justify-center bg-black/80 text-white">Save status</button>
                </form>

                <form th:action="@{/comments}" method="post" class="space-y-3">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <input type="hidden" name="ticketId" th:value="${ticket.id}" />
                    <label class="block text-xs font-semibold uppercase text-on-surface-variant mb-1" for="message">Reply</label>
                    <textarea id="message" name="message" rows="4" class="w-full rounded-lg border border-outline-variant bg-white px-3 py-2 text-sm" placeholder="Write a support reply..."></textarea>
                    <button type="submit" class="w-full rounded-lg px-4 py-2 text-sm font-medium justify-center bg-black/80 text-white">Post reply</button>
                </form>

                <form th:action="@{/tickets/{id}/resolve(id=${ticket.id})}" method="post" class="mt-4">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <!-- <textarea name="message" rows="3" class="w-full rounded-lg border border-outline-variant bg-white px-3 py-2 text-sm mb-3" placeholder="Optional resolution note..."></textarea> -->
                    <button type="submit" class="w-full bg-green-600 text-white rounded-lg px-4 py-2 text-sm font-medium">Mark resolved</button>
                </form>
            </div>

            <div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-4">
                <h3 class="text-xs font-semibold uppercase text-on-surface-variant mb-3">Customer</h3>
                <p class="text-sm font-semibold" th:text="${ticket.reporter.fullName}"></p>
                <p class="text-xs text-on-surface-variant" th:text="${ticket.reporter.email}"></p>
            </div>
        </aside>
    </div>
</main>
</body>
</html>
