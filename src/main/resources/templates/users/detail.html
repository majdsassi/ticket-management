<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title th:text="${user.fullName} + ' · Kinetic Ops'">User Detail · Kinetic Ops</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --surface: #f7f9fb;
            --surface-container-lowest: #ffffff;
            --surface-container-low: #f2f4f6;
            --surface-container-high: #e6e8ea;
            --on-surface: #191c1e;
            --on-surface-variant: #45474c;
            --outline: #75777d;
            --outline-variant: #c5c6cd;
            --primary: #091426;
            --primary-container: #1e293b;
            --secondary: #0058be;
            --error: #ba1a1a;
            --radius-default: 0.25rem;
            --radius-lg: 0.5rem;
            --radius-full: 9999px;
        }
        body { font-family: 'Inter', system-ui, sans-serif; background-color: var(--surface); color: var(--on-surface); }
        .headline-lg { font-size: 24px; font-weight: 600; line-height: 32px; letter-spacing: -0.01em; }
        .headline-md { font-size: 20px; font-weight: 600; line-height: 28px; }
        .body-md { font-size: 14px; font-weight: 400; line-height: 20px; }
        .body-sm { font-size: 13px; font-weight: 400; line-height: 18px; }
        .label-md { font-size: 12px; font-weight: 600; line-height: 16px; letter-spacing: 0.05em; text-transform: uppercase; }
        .kinetic-card {
            background-color: var(--surface-container-lowest);
            border: 1px solid var(--outline-variant);
            border-radius: var(--radius-lg);
            box-shadow: 0px 4px 12px rgba(30, 41, 59, 0.05);
        }
        .kinetic-btn-primary {
            background-color: var(--primary);
            color: white;
            font-weight: 600;
            font-size: 0.875rem;
            padding: 0.5rem 1rem;
            border-radius: var(--radius-default);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: background 0.2s;
            border: none;
            cursor: pointer;
        }
        .kinetic-btn-primary:hover { background-color: var(--primary-container); }
        .kinetic-btn-secondary {
            background-color: transparent;
            border: 1px solid var(--outline-variant);
            color: var(--on-surface-variant);
            border-radius: var(--radius-default);
            padding: 0.5rem 1rem;
            font-weight: 500;
            transition: all 0.2s;
        }
        .kinetic-btn-secondary:hover { border-color: var(--secondary); color: var(--secondary); }
        .info-row {
            display: flex;
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--outline-variant);
        }
        .info-label { width: 140px; font-weight: 600; color: var(--on-surface-variant); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }
        .info-value { flex: 1; color: var(--on-surface); font-size: 0.875rem; }
        .role-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            padding: 0.25rem 0.75rem;
            border-radius: var(--radius-full);
            font-size: 0.75rem;
            font-weight: 600;
        }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 450, 'GRAD' 0, 'opsz' 24; }
        .avatar-large {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-container) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 32px;
            font-weight: 600;
        }
    </style>
</head>
<body class="bg-surface">

<header class="sticky top-0 z-50 bg-surface-container-lowest/95 backdrop-blur-sm border-b border-outline-variant">
    <div class="max-w-5xl mx-auto px-4 sm:px-6 flex justify-between items-center h-16">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 rounded-md bg-primary flex items-center justify-center text-white font-bold text-sm">KO</div>
            <span class="text-xl font-bold tracking-tight text-primary">Kinetic<span class="font-medium text-on-surface-variant"> Ops</span></span>
        </div>
        <div class="flex items-center gap-3">
            <a href="/users" class="text-on-surface-variant text-sm hover:text-primary transition flex items-center gap-1">
                <span class="material-symbols-outlined text-base">arrow_back</span> All users
            </a>
            <a th:href="@{'/users/' + ${user.id} + '/edit'}" class="kinetic-btn-primary text-sm">
                <span class="material-symbols-outlined text-base">edit</span> Edit
            </a>
        </div>
    </div>
</header>

<main class="max-w-5xl mx-auto px-4 sm:px-6 py-8">
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <!-- Profile card (sidebar) -->
        <div class="lg:col-span-1">
            <div class="kinetic-card p-6 text-center">
                <div class="flex justify-center mb-4">
                    <div class="avatar-large">
                        <span th:text="${#strings.substring(user.fullName, 0, 1)}">J</span>
                    </div>
                </div>
                <h2 class="headline-md text-primary" th:text="${user.fullName}">John Doe</h2>
                <p class="body-sm text-on-surface-variant mt-1" th:text="${user.email}">john@example.com</p>
                <div class="mt-4">
                    <span class="role-badge" th:classappend="${user.role == 'ADMIN' ? 'bg-error/10 text-error' : (user.role == 'CUSTOMER_SUPPORT' ? 'bg-blue-100 text-blue-800' : 'bg-surface-container-high text-on-surface-variant')}">
                        <span th:text="${user.role != null ? user.role : 'USER'}">USER</span>
                    </span>
                </div>
                <div class="mt-4 pt-4 border-t border-outline-variant">
                    <div class="inline-flex items-center gap-2">
                        <span th:if="${user.active == true}" class="inline-flex items-center gap-1 text-green-700 text-sm">
                            <span class="w-2 h-2 rounded-full bg-green-600"></span> Active
                        </span>
                        <span th:unless="${user.active == true}" class="inline-flex items-center gap-1 text-error text-sm">
                            <span class="w-2 h-2 rounded-full bg-error"></span> Inactive
                        </span>
                    </div>
                </div>
            </div>
        </div>

        <!-- User details (main content) -->
        <div class="lg:col-span-2">
            <div class="kinetic-card p-6">
                <h3 class="label-md text-secondary mb-4">User information</h3>
                <div class="space-y-2">
                    <div class="info-row">
                        <div class="info-label">Full name</div>
                        <div class="info-value font-medium" th:text="${user.fullName}">John Doe</div>
                    </div>
                    <div class="info-row">
                        <div class="info-label">Email address</div>
                        <div class="info-value" th:text="${user.email}">john@example.com</div>
                    </div>
                    <div class="info-row">
                        <div class="info-label">Role</div>
                        <div class="info-value" th:text="${user.role != null ? user.role : 'USER'}">User</div>
                    </div>
                    <div class="info-row">
                        <div class="info-label">Account status</div>
                        <div class="info-value">
                            <span th:if="${user.active == true}" class="text-green-700">Active</span>
                            <span th:unless="${user.active == true}" class="text-error">Inactive</span>
                        </div>
                    </div>
                    <div class="info-row">
                        <div class="info-label">Member since</div>
                        <div class="info-value">
                            <span th:if="${user.createdAt != null}" th:text="${#temporals.format(user.createdAt, 'MMMM dd, yyyy · h:mm a')}">N/A</span>
                            <span th:unless="${user.createdAt != null}">Not available</span>
                        </div>
                    </div>
                    <div class="info-row" th:if="${user.updatedAt != null}">
                        <div class="info-label">Last updated</div>
                        <div class="info-value" th:text="${#temporals.format(user.updatedAt, 'MMMM dd, yyyy')}">N/A</div>
                    </div>
                </div>
            </div>

            <!-- Associated tickets (optional) -->
            <div class="kinetic-card p-6 mt-6" th:if="${user.assignedTickets != null and !user.assignedTickets.isEmpty()}">
                <h3 class="label-md text-secondary mb-4">Assigned tickets</h3>
                <div class="space-y-2">
                    <div th:each="ticket : ${user.assignedTickets}" class="flex items-center justify-between py-2 border-b border-outline-variant last:border-0">
                        <div>
                            <a th:href="@{'/tickets/' + ${ticket.id}}" class="font-medium text-secondary hover:underline" th:text="${ticket.title}">Ticket title</a>
                            <span class="text-xs text-on-surface-variant ml-2">#<span th:text="${ticket.id}">123</span></span>
                        </div>
                        <span class="text-xs px-2 py-0.5 rounded-full bg-surface-container-high" th:text="${ticket.status}">OPEN</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
