<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Create/Edit User</title>
</head>
<body>
<h1 th:if="${user.id == null}">Create User</h1>
<h1 th:if="${user.id != null}">Edit User</h1>

<form th:action="@{/users}" method="post" th:object="${user}">
    <input type="hidden" th:field="*{id}"/>
    
    <label>Full Name:</label>
    <input type="text" th:field="*{fullName}" required/><br/>
    
    <label>Email:</label>
    <input type="email" th:field="*{email}" required/><br/>
    
    <button type="submit">Save</button>
    <a href="/users">Cancel</a>
</form>
</body>
</html>
