<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Users</title>
</head>
<body>
<h1>Users</h1>
<a href="/users/new">Create user</a>
<ul>
    <li th:each="user : ${users}">
        <a th:href="@{'/users/' + ${user.id}}" th:text="${user.fullName}"></a>
    </li>
</ul>
</body>
</html>
